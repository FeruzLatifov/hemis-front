    <!--
      Preconnect to Google Fonts: opens TCP+TLS to fonts host before CSS @import
      kicks in, shaving off ~200-400ms on first paint over slow networks.
      crossorigin matches the actual font request (CORS-enabled).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script src="/config.js"></script>
  </head>

  </body>
