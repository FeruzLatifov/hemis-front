apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "hemis-front.fullname" . }}
  labels:
    {{- include "hemis-front.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "hemis-front.selectorLabels" . | nindent 6 }}
